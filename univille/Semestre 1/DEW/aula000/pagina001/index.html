<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página1</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://logosandtypes.com/wp-content/uploads/2020/08/univille.svg" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="login">
            <h2>Faça o seu login</h2>

                <form>
                    <label>Seu e-mail*</label>
                    <input type="email" required>

                    <label>Sua senha*</label>
                    <input type="password" required>

                    <div class="remember">
                        <input type="checkbox" id="lembrar">
                        <label for="lembrar">Lembrar-me</label>
                    </div>

                    <button type="submit">LOGIN</button>

                    <p class="forgot">Esqueceu sua senha? <a href="#">Clique aqui!</a></p>
                </form>
        </div>
</div>
</body>
</html>
